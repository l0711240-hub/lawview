<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>좀비 아포칼립스 - 모델 체크 시스템</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --point: #ff4757; --text: #f1f2f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; gap: 20px; height: 100vh; box-sizing: border-box; }
        .panel { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #333; overflow-y: auto; }
        #sidebar { width: 380px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        #main { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; min-width: 0; }
        input, select, textarea { width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 12px; background: #2f3542; color: #fff; border: 1px solid #444; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: var(--point); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #555; cursor: not-allowed; }
        #story-board { background: #000; flex-grow: 1; padding: 25px; border-radius: 12px; line-height: 1.8; overflow-y: auto; border: 1px solid #222; }
        .char-card { background: #2f3542; padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid var(--point); position: relative; font-size: 0.9rem; }
        .day-title { color: var(--point); font-size: 1.4rem; font-weight: bold; border-bottom: 1px solid #444; margin-bottom: 15px; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="panel">
        <h3>🔑 1. API & 모델 체크</h3>
        <input type="password" id="api-key" placeholder="Gemini API Key 입력">
        <button onclick="checkModels()" id="check-btn" style="background: #2ed573;">사용 가능 모델 확인</button>
        <select id="model-select">
            <option value="">모델을 먼저 확인하세요</option>
        </select>
        <p id="status-msg" style="font-size: 11px; color: #aaa;"></p>
    </div>

    <div class="panel" style="flex-grow: 1;">
        <h3>👥 2. 캐릭터 설정</h3>
        <input type="text" id="c-name" placeholder="이름">
        <input type="text" id="c-age" placeholder="나이">
        <input type="text" id="c-job" placeholder="직업">
        <input type="text" id="c-gender" placeholder="성별">
        <input type="text" id="c-mbti" placeholder="성격/MBTI">
        <input type="text" id="c-stats" placeholder="능력/스킬">
        <textarea id="c-mind" rows="2" placeholder="신념 및 가치관"></textarea>
        <input type="text" id="c-rel" placeholder="관계">
        <textarea id="c-extra" rows="2" placeholder="특이점/여담"></textarea>
        <button onclick="addChar()" style="background: #1e90ff;">일행에 합류시키기</button>
        <div id="char-list" style="margin-top: 15px;"></div>
    </div>
</div>

<div id="main">
    <button onclick="nextDay()" id="run-btn" style="height: 60px; font-size: 1.2rem;">📅 다음 날로 진행 (하루 보내기)</button>
    <div id="story-board">
        <p style="text-align: center; color: #555; margin-top: 100px;">API 키를 입력하고 모델을 확인한 뒤 스토리를 시작하세요.</p>
    </div>
</div>

<script>
    let characters = [];
    let day = 0;

    // 1. 사용 가능한 모델 목록 가져오기
    async function checkModels() {
        const key = document.getElementById('api-key').value;
        const msg = document.getElementById('status-msg');
        const select = document.getElementById('model-select');
        
        if(!key) return alert("API 키를 먼저 입력하세요!");
        
        msg.innerText = "모델 목록을 불러오는 중...";
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
            const data = await res.json();
            
            if(data.error) throw new Error(data.error.message);
            
            select.innerHTML = "";
            // generateContent가 가능한 모델만 필터링
            const availableModels = data.models.filter(m => m.supportedGenerationMethods.includes("generateContent"));
            
            availableModels.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.name; // 예: models/gemini-2.5-flash
                opt.innerText = m.displayName;
                select.appendChild(opt);
            });
            
            msg.style.color = "#2ed573";
            msg.innerText = `성공! ${availableModels.length}개의 모델을 찾았습니다.`;
        } catch(e) {
            msg.style.color = "#ff4757";
            msg.innerText = "오류: " + e.message;
        }
    }

    // 2. 캐릭터 추가
    function addChar() {
        const name = document.getElementById('c-name').value;
        if(!name) return alert("이름을 입력하세요!");
        
        const c = {
            이름: name,
            나이: document.getElementById('c-age').value,
            성별: document.getElementById('c-gender').value
            직업: document.getElementById('c-job').value,
            성격: document.getElementById('c-mbti').value,
            능력: document.getElementById('c-stats').value,
            신념: document.getElementById('c-mind').value,
            관계: document.getElementById('c-rel').value
            여담: document.getElementById('c-extra').value
        };
        characters.push(c);
        renderChars();
        // 입력창 청소
        document.querySelectorAll('input[type="text"], textarea').forEach(i => i.value="");
    }

    function renderChars() {
        const list = document.getElementById('char-list');
        list.innerHTML = characters.map((c, i) => `
            <div class="char-card">
                <strong>${c.이름}</strong> (${c.정보})<br>
                <small>${c.성격} / ${c.능력}</small>
                <button onclick="characters.splice(${i},1);renderChars();" style="width:auto; padding:2px 5px; font-size:10px; background:#555; margin-top:5px;">제거</button>
            </div>
        `).join('');
    }

    // 3. 스토리 진행
    async function nextDay() {
        const key = document.getElementById('api-key').value;
        const model = document.getElementById('model-select').value;
        if(!key || !model) return alert("API 키 입력과 모델 선택을 완료해주세요.");
        if(characters.length === 0) return alert("생존자가 최소 한 명은 있어야 합니다.");

        const btn = document.getElementById('run-btn');
        btn.disabled = true;
        btn.innerText = "⏳ 인공지능이 생존기를 쓰는 중...";
        
        day++;
        
        const prompt = `
            당신은 좀비 아포칼립스 세계관의 정교한 스토리텔러입니다. 
            [현재 생존자 그룹]: ${JSON.stringify(characters)}
            [현재 날짜]: 생존 ${day}일차
            
            지시사항:
            1. 위 캐릭터들의 MBTI, 성격, 신념, 관계를 바탕으로 오늘 하루의 일상과 사건을 소설처럼 묘사하세요.
            2. 캐릭터 간의 대화를 포함하고, 각자의 가치관이 드러나게 하세요.
            3. 누군가 다치거나 죽거나, 뜻밖의 행운을 만날 수도 있습니다. (절대적인 안전은 없습니다.)
            4. 외부 캐릭터를 임의로 추가하지 마세요.
            5. 출력은 HTML 형식(<p>, <strong> 등 사용)으로 작성하세요.
            6. 출력이 길면 안됩니다. 한 번의 응답이 1000자 내외로 유지되게 하세요.
            7. 캐릭터의 정보를 그대로 응답하지 마세요. 캐릭터의 스킬을 직접적으로 언급하는게 아니라 스킬에서 얻을 수 있는 능력과 분위기를 추측해서 캐릭터의 능력을 보여주세요.
        `;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            
            const story = data.candidates[0].content.parts[0].text;
            const board = document.getElementById('story-board');
            if(day === 1) board.innerHTML = "";
            
            const log = document.createElement('div');
            log.style.marginBottom = "30px";
            log.innerHTML = `<div class="day-title">DAY ${day}</div>` + story.replace(/```html|```/g, '');
            board.prepend(log);
        } catch(e) {
            alert("스토리 생성 실패: " + e.message);
            day--;
        } finally {
            btn.disabled = false;
            btn.innerText = "📅 다음 날로 진행 (하루 보내기)";
        }
    }
</script>
</body>

</html>
